<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <title>玄关</title>
  <style>
    :root {
      --sidebar-bg: #18181b;
      /* Sophisticated dark */
      --list-bg: #ffffff;
      --chat-bg: #f8fafc;
      /* Sleeker light blue/gray background */
      --brand: #2563eb;
      /* Modern Cobalt Blue */
      --brand-hover: #1d4ed8;
      --border: #e2e8f0;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --msg-me: #2563eb;
      --msg-me-text: #ffffff;
      --msg-other: #ffffff;
      --msg-other-text: #1e293b;
      --font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      outline: none;
    }

    body {
      font-family: var(--font-family);
      background: #e2e8f0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      color: var(--text-main);
    }

    /* Login Screen */
    #loginScreen {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .login-box {
      background: white;
      padding: 40px;
      border-radius: var(--radius-lg);
      width: 100%;
      max-width: 400px;
      box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.5);
      text-align: center;
    }

    .login-box h1 {
      margin: 0 0 8px;
      font-size: 24px;
      color: #0f172a;
    }

    .login-box p {
      color: var(--text-muted);
      margin-bottom: 32px;
      font-size: 14px;
    }

    .login-input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 16px;
      margin-bottom: 20px;
      transition: all 0.2s;
    }

    .login-input:focus {
      outline: none;
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(0, 132, 255, 0.1);
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      background: var(--brand);
      color: white;
      border: none;
      border-radius: var(--radius-md);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .login-btn:hover {
      background: var(--brand-hover);
    }

    .settings-link {
      margin-top: 24px;
      display: block;
      color: var(--text-muted);
      font-size: 13px;
      text-decoration: none;
      cursor: pointer;
    }

    .settings-link:hover {
      color: var(--brand);
    }

    .btn-lite {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 4px 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .btn-lite:hover {
      background: #f3f4f6;
      color: var(--text-main);
    }

    .btn-lite.primary {
      color: var(--brand);
    }

    .btn-lite.primary:hover {
      background: #eff6ff;
      color: var(--brand-hover);
    }

    /* Main App Layout */
    #mainApp {
      display: none;
      height: 100%;
      grid-template-columns: 68px 320px 1fr;
    }

    /* Sidebar Navigation */
    .nav-bar {
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 0;
      gap: 20px;
      position: relative;
    }

    .nav-item {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      color: #94a3b8;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      background: transparent;
    }

    .nav-item:hover {
      background: rgba(255, 255, 255, 0.05);
      color: #f1f5f9;
    }

    .nav-item.active {
      background: rgba(255, 255, 255, 0.1);
      color: #ffffff;
    }

    .nav-item.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 10px;
      bottom: 10px;
      width: 3px;
      background: var(--brand);
      border-radius: 0 4px 4px 0;
      box-shadow: 0 0 10px rgba(37, 99, 235, 0.5);
    }

    .nav-item .badge {
      position: absolute;
      top: -2px;
      right: -2px;
      background: #ef4444;
      color: white;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 10px;
      box-shadow: 0 0 0 2px var(--sidebar-bg);
    }

    .nav-spacer {
      flex: 1;
    }

    .avatar-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #4b5563;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      cursor: pointer;
      border: 2px solid rgba(255, 255, 255, 0.1);
    }

    /* List Column */
    .list-col {
      background: var(--list-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .list-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
    }

    .list-header h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .list-header .search-wrap {
      margin-top: 16px;
      position: relative;
    }

    .list-header input {
      width: 100%;
      padding: 8px 12px;
      background: #f3f4f6;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      transition: background 0.2s;
      cursor: text;
    }

    .list-header input:focus {
      background: #e5e7eb;
      outline: none;
    }

    .list-content {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    /* List Items */
    .item {
      padding: 12px;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      gap: 12px;
      align-items: stretch;
      margin-bottom: 4px;
      border: 1px solid transparent;
      position: relative;
    }

    .item:hover {
      background: #f9fafb;
    }

    .item.active {
      background: #eff6ff;
    }

    .item-avatar {
      width: 44px;
      height: 44px;
      background: #e5e7eb;
      border-radius: 10px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: #4b5563;
    }

    .item-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 2px 0;
    }

    .item-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2px;
    }

    .item-name {
      font-weight: 500;
      font-size: 15px;
      color: var(--text-main);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .item-time {
      font-size: 11px;
      color: var(--text-muted);
    }

    .item-preview {
      font-size: 13px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .item .badge {
      position: absolute;
      right: 12px;
      bottom: 12px;
      background: #ef4444;
      color: white;
      font-size: 11px;
      min-width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 9px;
      padding: 0 4px;
    }

    /* Chat Area */
    .chat-col {
      display: flex;
      flex-direction: column;
      background: var(--chat-bg);
      position: relative;
      min-height: 0;
    }

    .chat-header {
      height: 64px;
      padding: 0 24px;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 10;
    }

    .chat-header-info h3 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
    }

    .chat-header-info p {
      margin: 2px 0 0;
      font-size: 12px;
      color: var(--text-muted);
    }

    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .msg-group-time {
      align-self: center;
      background: rgba(0, 0, 0, 0.05);
      padding: 2px 10px;
      border-radius: 10px;
      font-size: 11px;
      color: var(--text-muted);
      margin: 10px 0;
    }

    .message {
      display: flex;
      flex-direction: column;
      margin-bottom: 24px;
      max-width: 80%;
      position: relative;
    }

    .message.me {
      align-self: flex-end;
      flex-direction: row-reverse;
      align-items: flex-end;
    }

    .msg-bubble {
      padding: 12px 18px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.6;
      word-break: break-word;
      position: relative;
      background: white;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
      border: 1px solid rgba(0, 0, 0, 0.04);
    }

    .message.me .msg-bubble {
      background: var(--msg-me);
      color: var(--msg-me-text);
      border-bottom-right-radius: 4px;
      border-color: rgba(0, 0, 0, 0.1);
    }

    .message:not(.me) .msg-bubble {
      background: var(--msg-other);
      color: var(--msg-other-text);
      border-bottom-left-radius: 4px;
    }

    .msg-meta {
      display: flex;
      gap: 12px;
      padding: 6px 4px;
      font-size: 11px;
      color: var(--text-muted);
    }

    .message.me .msg-meta {
      justify-content: flex-end;
    }

    /* Composer */
    .composer-area {
      padding: 12px 24px 24px;
      background: white;
      border-top: 1px solid var(--border);
      box-shadow: 0 -4px 6px -4px rgba(0, 0, 0, 0.02);
    }

    .composer-tools {
      display: flex;
      gap: 12px;
      margin-bottom: 8px;
      align-items: center;
    }

    .composer-tools select {
      padding: 6px 8px;
      border: 1px solid transparent;
      border-radius: 6px;
      font-size: 13px;
      color: var(--text-muted);
      background: transparent;
      transition: all 0.2s;
      cursor: pointer;
      outline: none;
      appearance: auto;
    }

    .composer-tools select:hover {
      background: #f3f4f6;
      color: var(--text-main);
    }

    .composer-input-wrap {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    .composer-input-wrap textarea {
      flex: 1;
      min-height: 48px;
      max-height: 150px;
      padding: 12px 0;
      border: none;
      border-radius: 0;
      font-size: 15px;
      resize: none;
      background: transparent;
      transition: all 0.2s;
      outline: none;
      line-height: 1.5;
    }

    .send-btn {
      width: 40px;
      height: 40px;
      background: var(--brand);
      color: white;
      border: none;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .send-btn:hover {
      background: var(--brand-hover);
      transform: scale(1.05);
    }

    /* Modals & Overlays */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      backdrop-filter: blur(4px);
    }

    .modal {
      background: white;
      border-radius: 12px;
      width: 100%;
      max-width: 480px;
      padding: 24px;
      box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .modal-header h4 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
    }

    .modal-close {
      cursor: pointer;
      font-size: 20px;
      color: var(--text-muted);
    }

    .field-group {
      margin-bottom: 16px;
    }

    .field-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 6px;
      color: var(--text-muted);
    }

    .field-input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border 0.2s;
    }

    .field-input:focus {
      border-color: var(--brand);
    }

    /* Utility */
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      background: #9ca3af;
      margin-right: 6px;
    }

    .status-dot.ok {
      background: #10b981;
    }

    .status-dot.err {
      background: #ef4444;
    }

    .hint {
      font-size: 12px;
      color: var(--text-muted);
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #1f2937;
      color: white;
      padding: 10px 20px;
      border-radius: 30px;
      font-size: 14px;
      z-index: 3000;
      box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
      display: none;
    }

    /* Scrollbars */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #d1d5db;
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #9ca3af;
    }

    /* Responsive */
    @media (max-width: 900px) {
      #mainApp {
        grid-template-columns: 60px 1fr;
      }

      .list-col {
        display: none;
      }

      #mainApp.show-list .list-col {
        display: flex;
        position: absolute;
        left: 60px;
        top: 0;
        bottom: 0;
        z-index: 50;
        width: calc(100% - 60px);
      }
    }
  </style>
</head>

<body>

  <!-- Login Screen -->
  <div id="loginScreen">
    <div class="login-box">
      <h1>玄关</h1>
      <p>请输入您的 User ID 以开始使用</p>
      <input type="text" id="userId" class="login-input" placeholder="User ID" value="user_123456" />
      <button id="btnConnect" class="login-btn">登录并连接</button>
      <a class="settings-link" onclick="openModal('settingsModal')">⚙️ 设置服务器配置</a>
    </div>
  </div>

  <!-- Main Application -->
  <div id="mainApp" class="app">
    <!-- Sidebar Navigation -->
    <nav class="nav-bar">
      <div class="avatar-btn" id="userAvatar">U</div>
      <div class="nav-item active" id="navConvs" onclick="switchTab('convs')">
        <span>💬</span>
        <div id="totalUnread" class="badge" style="display:none">0</div>
      </div>
      <div class="nav-item" id="navContacts" onclick="switchTab('contacts')">
        <span>👤</span>
      </div>
      <div class="nav-spacer"></div>
      <div class="nav-item" onclick="openModal('settingsModal')">
        <span>⚙️</span>
      </div>
    </nav>

    <!-- List Column: Conversations -->
    <aside id="panelConvs" class="list-col">
      <div class="list-header">
        <h2>会话 <button class="btn-lite primary" onclick="openModal('groupModal')">➕ 群组</button></h2>
        <div class="search-wrap">
          <input type="text" id="convSearch" placeholder="搜索..." />
        </div>
      </div>
      <div id="convList" class="list-content">
        <!-- Conversations will be rendered here -->
      </div>
    </aside>

    <!-- List Column: Contacts -->
    <aside id="panelContacts" class="list-col" style="display:none">
      <div class="list-header">
        <h2>通讯录 <button class="btn-lite primary" onclick="openModal('contactModal')">➕ 添加</button></h2>
        <div class="search-wrap">
          <input type="text" id="contactSearch" placeholder="搜索..." />
        </div>
      </div>
      <div id="contactList" class="list-content">
        <!-- Contacts will be rendered here -->
      </div>
    </aside>

    <!-- Chat Area -->
    <section id="panelChat" class="chat-col">
      <div class="chat-header">
        <div class="chat-header-info">
          <h3 id="chatTitle">未选择会话</h3>
          <p id="chatMeta"><span id="dot" class="status-dot"></span><span id="statusText">等待连接...</span></p>
        </div>
        <div class="chat-header-tools">
          <span class="hint" id="wsState" style="margin-right: 12px;">WS: -</span>
          <button id="btnDisconnect" class="btn-lite">断开连接</button>
        </div>
      </div>

      <div class="messages-container" id="msgs">
        <div class="hint" style="text-align:center; padding-top:40px;">👋 欢迎使用，请从左侧选择一个会话。</div>
      </div>

      <button id="jumpNew" class="toast" style="bottom: 150px; cursor: pointer;">有新消息，点击跳转到底部</button>

      <div class="composer-area">
        <div class="composer-tools">
          <select id="sendRole" style="display:none">
            <option value="user">作为用户 发送</option>
            <option value="agent">作为 Agent 发送</option>
          </select>
          <select id="msgType" style="display:none">
            <option value="text">文字</option>
            <option value="markdown">Markdown</option>
          </select>
          <div class="hint" style="margin-left: auto;">
            <span id="selectedConv">ID: -</span> | <span id="draftCount">0 字</span>
          </div>
        </div>
        <div class="composer-input-wrap">
          <textarea id="text" placeholder="输入消息... (Ctrl+Enter 发送)"></textarea>
          <div id="mentionMenu" class="mention-menu"
            style="display:none; position: absolute; bottom: 100%; left: 0; width: 100%; background: white; border: 1px solid var(--border); box-shadow: var(--card-shadow); border-radius: 8px; max-height: 200px; overflow-y: auto;">
          </div>
          <button id="sendBtn" class="send-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M22 2L11 13M22 2L15 22L11 13M11 13L2 9L22 2" stroke="white" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </button>
        </div>
        <div id="sendState" class="hint" style="margin-top:4px; text-align:right;">发送状态: 空闲</div>
        <button id="retryBtn"
          style="display:none; margin-top:4px; font-size:12px; color: var(--brand); background: none; border: none; cursor: pointer; text-decoration: underline;">重试上次失败</button>
      </div>
    </section>
  </div>

  <!-- Settings Modal -->
  <div id="settingsModal" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h4>服务器配置</h4>
        <span class="modal-close" onclick="closeModal('settingsModal')">&times;</span>
      </div>
      <div class="field-group">
        <label class="field-label">API URL</label>
        <input type="text" id="apiUrl" class="field-input" value="http://192.168.91.107:3001" />
      </div>
      <div class="field-group">
        <label class="field-label">App ID</label>
        <input type="text" id="appId" class="field-input" value="cli_xxxxxxxxxxxxxxxx" />
      </div>
      <div class="field-group">
        <label class="field-label">App Secret</label>
        <input type="password" id="appSecret" class="field-input" value="" />
      </div>
      <button class="login-btn" onclick="closeModal('settingsModal')">保存并关闭</button>
      <div style="margin-top:12px;">
        <button id="btnNotify" class="login-btn" style="background:#f59e0b;">请求浏览器通知权限</button>
      </div>
    </div>
  </div>

  <!-- Group Modal -->
  <div id="groupModal" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h4>创建新群组</h4>
        <span class="modal-close" onclick="closeModal('groupModal')">&times;</span>
      </div>
      <div class="field-group">
        <label class="field-label">群组名称</label>
        <input type="text" id="groupTitle" class="field-input" placeholder="我的新群组" />
      </div>
      <div class="field-group">
        <label class="field-label">选择成员 (Agent)</label>
        <div id="groupAgentPicker" style="display:flex; gap:8px; flex-wrap:wrap;"></div>
      </div>
      <div class="field-group">
        <label class="field-label">其他成员 User ID (逗号分隔)</label>
        <input type="text" id="groupCustomMembers" class="field-input" placeholder="user_a, user_b" />
      </div>
      <button id="btnCreateGroup" class="login-btn">立即创建</button>
    </div>
  </div>

  <!-- Contact Modal -->
  <div id="contactModal" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h4>添加联系人</h4>
        <span class="modal-close" onclick="closeModal('contactModal')">&times;</span>
      </div>
      <div class="field-group">
        <label class="field-label">User ID</label>
        <input type="text" id="contactId" class="field-input" placeholder="例如: coder" />
      </div>
      <div class="field-group">

  <script type="module" src="/js/chat/main.js"></script>
  <script>
    // Helper functions for UI interaction
    window.openModal = function (id) { document.getElementById(id).style.display = 'flex'; };
    window.closeModal = function (id) { document.getElementById(id).style.display = 'none'; };
    window.switchTab = function (tab) {
      document.getElementById('panelConvs').style.display = tab === 'convs' ? 'flex' : 'none';
      document.getElementById('panelContacts').style.display = tab === 'contacts' ? 'flex' : 'none';
      document.getElementById('navConvs').classList.toggle('active', tab === 'convs');
      document.getElementById('navContacts').classList.toggle('active', tab === 'contacts');
    };
  </script>
