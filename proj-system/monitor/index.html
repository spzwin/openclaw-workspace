<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐾 Agent 监控中心</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      min-height: 100vh;
    }
    
    .header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      padding: 20px 30px;
      border-bottom: 2px solid #0f3460;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .header h1 {
      font-size: 24px;
      color: #e94560;
    }
    
    .status-bar {
      display: flex;
      gap: 20px;
      align-items: center;
    }
    
    .poll-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: #888;
    }
    
    .poll-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    
    .container {
      display: flex;
      height: calc(100vh - 80px);
    }
    
    .sidebar {
      width: 280px;
      background: #11111a;
      border-right: 1px solid #2a2a3e;
      overflow-y: auto;
    }
    
    .sidebar-header {
      padding: 15px 20px;
      border-bottom: 1px solid #2a2a3e;
      font-size: 14px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .project-list {
      list-style: none;
    }
    
    .project-item {
      padding: 15px 20px;
      border-bottom: 1px solid #1a1a3e;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .project-item:hover {
      background: #1a1a2e;
    }
    
    .project-item.active {
      background: #0f3460;
      border-left: 3px solid #e94560;
    }
    
    .project-name {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 5px;
    }
    
    .project-id {
      font-size: 12px;
      color: #666;
      font-family: monospace;
    }
    
    .project-status {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      margin-top: 5px;
    }
    
    .status-in_progress { background: #3b82f6; color: white; }
    .status-completed { background: #4ade80; color: #000; }
    .status-pending { background: #fbbf24; color: #000; }
    .status-failed { background: #ef4444; color: white; }
    
    .main-content {
      flex: 1;
      padding: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .project-overview {
      padding: 25px 30px;
      background: #11111a;
      border-bottom: 1px solid #2a2a3e;
      flex-shrink: 0;
    }
    
    .overview-title {
      font-size: 18px;
      color: #e94560;
      margin-bottom: 15px;
    }
    
    .overview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
    }
    
    .overview-item {
      background: #1a1a2e;
      padding: 15px;
      border-radius: 6px;
      border: 1px solid #2a2a3e;
    }
    
    .overview-label {
      font-size: 12px;
      color: #888;
      margin-bottom: 5px;
    }
    
    .overview-value {
      font-size: 16px;
      font-weight: 600;
      color: #e0e0e0;
    }
    
    .tabs-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .tabs-header {
      display: flex;
      background: #0a0a0f;
      border-bottom: 1px solid #2a2a3e;
      padding: 0 30px;
      flex-shrink: 0;
    }
    
    .tab-button {
      padding: 15px 20px;
      background: transparent;
      border: none;
      color: #888;
      font-size: 14px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      position: relative;
      top: 1px;
    }
    
    .tab-button:hover {
      color: #e0e0e0;
      background: #11111a;
    }
    
    .tab-button.active {
      color: #e94560;
      border-bottom-color: #e94560;
      background: #11111a;
    }
    
    .tab-badge {
      display: inline-block;
      padding: 2px 8px;
      background: #e94560;
      color: white;
      border-radius: 10px;
      font-size: 11px;
      margin-left: 8px;
    }
    
    .tab-content {
      flex: 1;
      padding: 25px 30px;
      overflow-y: auto;
      display: none;
    }
    
    .tab-content.active {
      display: block;
    }
    
    .section-title {
      font-size: 16px;
      color: #e94560;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 1px solid #2a2a3e;
    }
    
    .agent-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 15px;
    }
    
    .agent-card {
      background: #11111a;
      border: 1px solid #2a2a3e;
      border-radius: 8px;
      padding: 20px;
      transition: all 0.2s;
    }
    
    .agent-card:hover {
      border-color: #0f3460;
    }
    
    .agent-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }
    
    .agent-name {
      font-size: 15px;
      font-weight: 600;
    }
    
    .agent-status {
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }
    
    .status-idle { background: #4b5563; color: white; }
    .status-working { background: #3b82f6; color: white; }
    .status-busy { background: #f59e0b; color: #000; }
    .status-error { background: #ef4444; color: white; }
    .status-unknown { background: #6b7280; color: white; }
    
    .agent-info {
      font-size: 13px;
      color: #888;
      line-height: 1.8;
    }
    
    .agent-info strong {
      color: #ccc;
    }
    
    .deliverables-list {
      list-style: none;
    }
    
    .deliverable-item {
      background: #11111a;
      border: 1px solid #2a2a3e;
      border-radius: 6px;
      padding: 15px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.2s;
    }
    
    .deliverable-item:hover {
      border-color: #0f3460;
      background: #1a1a2e;
    }
    
    .deliverable-info {
      flex: 1;
    }
    
    .deliverable-name {
      font-size: 14px;
      font-family: monospace;
      color: #e0e0e0;
      margin-bottom: 5px;
    }
    
    .deliverable-path {
      font-size: 12px;
      color: #666;
      font-family: monospace;
    }
    
    .deliverable-meta {
      font-size: 12px;
      color: #666;
      text-align: right;
    }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #666;
    }
    
    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 20px;
    }
    
    .loading {
      text-align: center;
      padding: 40px;
      color: #888;
    }
    
    .error-msg {
      background: #450a0a;
      border: 1px solid #ef4444;
      color: #fca5a5;
      padding: 15px;
      border-radius: 6px;
      margin-bottom: 20px;
    }
    
    .file-icon {
      margin-right: 8px;
    }
    
    /* 工作流流程图样式 */
    .workflow-container {
      background: #11111a;
      border: 1px solid #2a2a3e;
      border-radius: 8px;
      padding: 30px;
      margin-bottom: 20px;
    }
    
    .workflow-svg {
      width: 100%;
      min-height: 400px;
    }
    
    .phase-node {
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .phase-node:hover {
      transform: scale(1.02);
    }
    
    .phase-rect {
      rx: 8;
      ry: 8;
      transition: all 0.3s;
    }
    
    .phase-pending .phase-rect {
      fill: #1a1a2e;
      stroke: #4b5563;
      stroke-width: 2;
    }
    
    .phase-active .phase-rect {
      fill: #1e3a5f;
      stroke: #3b82f6;
      stroke-width: 3;
    }
    
    .phase-completed .phase-rect {
      fill: #14532d;
      stroke: #4ade80;
      stroke-width: 2;
    }
    
    .phase-title {
      font-size: 14px;
      font-weight: 600;
      fill: #e0e0e0;
    }
    
    .phase-active .phase-title {
      fill: #60a5fa;
    }
    
    .phase-desc {
      font-size: 11px;
      fill: #888;
    }
    
    .task-node {
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .task-node:hover {
      transform: translateX(5px);
    }
    
    .task-circle {
      transition: all 0.3s;
    }
    
    .task-pending .task-circle {
      fill: #0a0a0f;
      stroke: #4b5563;
      stroke-width: 2;
    }
    
    .task-active .task-circle {
      fill: #1e3a5f;
      stroke: #3b82f6;
      stroke-width: 3;
      animation: taskPulse 1.5s infinite;
    }
    
    .task-completed .task-circle {
      fill: #14532d;
      stroke: #4ade80;
      stroke-width: 2;
    }
    
    @keyframes taskPulse {
      0%, 100% {
        filter: drop-shadow(0 0 2px #3b82f6);
      }
      50% {
        filter: drop-shadow(0 0 8px #3b82f6);
      }
    }
    
    .task-label {
      font-size: 12px;
      fill: #e0e0e0;
    }
    
    .task-agent {
      font-size: 10px;
      fill: #888;
    }
    
    .flow-arrow {
      stroke: #4b5563;
      stroke-width: 2;
      fill: none;
      marker-end: url(#arrowhead);
    }
    
    .flow-arrow-active {
      stroke: #3b82f6;
      stroke-width: 3;
      stroke-dasharray: 5, 5;
      animation: flowMove 1s linear infinite;
    }
    
    @keyframes flowMove {
      to {
        stroke-dashoffset: -10;
      }
    }
    
    .next-step-box {
      background: linear-gradient(135deg, #1e3a5f 0%, #0f3460 100%);
      border: 2px solid #3b82f6;
      border-radius: 8px;
      padding: 20px;
      margin-top: 20px;
    }
    
    .next-step-title {
      font-size: 14px;
      color: #60a5fa;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .next-step-content {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
    
    .next-step-item {
      background: #0a0a0f;
      padding: 12px 16px;
      border-radius: 6px;
      flex: 1;
      min-width: 200px;
    }
    
    .next-step-label {
      font-size: 11px;
      color: #888;
      margin-bottom: 5px;
    }
    
    .next-step-value {
      font-size: 14px;
      color: #e0e0e0;
      font-weight: 600;
    }
    
    .legend {
      display: flex;
      gap: 20px;
      margin-top: 20px;
      padding-top: 15px;
      border-top: 1px solid #2a2a3e;
    }
    
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #888;
    }
    
    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }
    
    .legend-pending { background: #4b5563; }
    .legend-active { background: #3b82f6; }
    .legend-completed { background: #4ade80; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🐾 Agent 监控中心</h1>
    <div class="status-bar">
      <div class="poll-indicator">
        <div class="poll-dot"></div>
        <span>每 5 秒自动刷新</span>
      </div>
      <span id="lastUpdate">--:--:--</span>
    </div>
  </div>
  
  <div class="container">
    <div class="sidebar">
      <div class="sidebar-header">📁 项目列表</div>
      <ul class="project-list" id="projectList">
        <li class="loading">加载中...</li>
      </ul>
    </div>
    
    <div class="main-content">
      <!-- 项目概况 -->
      <div class="project-overview" id="projectOverview">
        <div class="empty-state">
          <div class="empty-state-icon">👈</div>
          <div>选择一个项目查看详情</div>
        </div>
      </div>
      
      <!-- Tab 页签 -->
      <div class="tabs-container" id="tabsContainer" style="display: none;">
        <div class="tabs-header" id="tabsHeader">
          <!-- 动态生成 Tab -->
        </div>
        
        <!-- Tab 1: 工作流图 -->
        <div class="tab-content active" id="tab-workflow">
          <div class="section-title">📊 工作流进度</div>
          <div class="workflow-container" id="workflowContainer">
            <div class="loading">加载工作流...</div>
          </div>
        </div>
        
        <!-- Tab 2: Agent 状态 -->
        <div class="tab-content" id="tab-agents">
          <div class="section-title">🤖 Agent 实时状态</div>
          <div class="agent-grid" id="agentGrid">
            <div class="loading">加载中...</div>
          </div>
        </div>
        
        <!-- 动态生成的 Agent 产出 Tab -->
        <div id="agentDeliverablesTabs">
          <!-- 动态内容 -->
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = 'http://localhost:3456/api';
    let selectedProject = null;
    let projectData = null;
    let activeTab = 'workflow';
    
    // 格式化时间
    function formatTime(date) {
      return new Date(date).toLocaleTimeString('zh-CN', { hour12: false });
    }
    
    function formatDateTime(date) {
      return new Date(date).toLocaleString('zh-CN', { hour12: false });
    }
    
    // 格式化文件大小
    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }
    
    // 获取状态中文
    function getStatusText(status) {
      const map = {
        'idle': '空闲',
        'working': '工作中',
        'busy': '忙碌',
        'error': '错误',
        'in_progress': '进行中',
        'completed': '已完成',
        'pending': '待处理',
        'failed': '失败',
        'unknown': '未知'
      };
      return map[status] || status;
    }
    
    // 获取文件图标
    function getFileIcon(filename) {
      if (filename.endsWith('.md')) return '📝';
      if (filename.endsWith('.json')) return '📋';
      if (filename.endsWith('.txt')) return '📄';
      return '📁';
    }
    
    // 加载项目列表
    async function loadProjects() {
      try {
        const res = await fetch(`${API_BASE}/projects`);
        const projects = await res.json();
        renderProjectList(projects);
      } catch (e) {
        document.getElementById('projectList').innerHTML = 
          '<li class="error-msg">加载失败：' + e.message + '</li>';
      }
    }
    
    // 渲染项目列表
    function renderProjectList(projects) {
      const list = document.getElementById('projectList');
      
      if (projects.length === 0) {
        list.innerHTML = '<li class="empty-state">暂无项目</li>';
        return;
      }
      
      list.innerHTML = projects.map(p => `
        <li class="project-item ${selectedProject === p.id ? 'active' : ''}" 
            onclick="selectProject('${p.id}')">
          <div class="project-name">${p.name || p.id}</div>
          <div class="project-id">${p.id}</div>
          <span class="project-status status-${p.status}">${getStatusText(p.status)}</span>
        </li>
      `).join('');
    }
    
    // 选择项目
    async function selectProject(projectId) {
      selectedProject = projectId;
      await loadProjectDetails(projectId);
      loadProjects();
    }
    
    // 加载项目详情
    async function loadProjectDetails(projectId) {
      try {
        const res = await fetch(`${API_BASE}/project/${projectId}`);
        projectData = await res.json();
        renderProjectOverview(projectData);
        renderWorkflow(projectData);
        renderAgentGrid(projectData);
        renderAgentDeliverablesTabs(projectData);
        updateLastUpdate();
        
        // 显示 Tabs 容器
        document.getElementById('tabsContainer').style.display = 'flex';
      } catch (e) {
        document.getElementById('projectOverview').innerHTML = 
          '<div class="error-msg">加载失败：' + e.message + '</div>';
      }
    }
    
    // 渲染项目概况
    function renderProjectOverview(data) {
      const { project } = data;
      
      if (!project) {
        document.getElementById('projectOverview').innerHTML = 
          '<div class="empty-state">项目不存在</div>';
        document.getElementById('tabsContainer').style.display = 'none';
        return;
      }
      
      document.getElementById('projectOverview').innerHTML = `
        <div class="overview-title">📊 项目概况</div>
        <div class="overview-grid">
          <div class="overview-item">
            <div class="overview-label">项目 ID</div>
            <div class="overview-value" style="font-family: monospace;">${project.id}</div>
          </div>
          <div class="overview-item">
            <div class="overview-label">项目名称</div>
            <div class="overview-value">${project.name || '-'}</div>
          </div>
          <div class="overview-item">
            <div class="overview-label">状态</div>
            <div class="overview-value">
              <span class="project-status status-${project.status}">${getStatusText(project.status)}</span>
            </div>
          </div>
          <div class="overview-item">
            <div class="overview-label">进度</div>
            <div class="overview-value">${project.progress?.percentComplete || 0}%</div>
          </div>
          <div class="overview-item">
            <div class="overview-label">创建时间</div>
            <div class="overview-value" style="font-size: 14px;">${formatDateTime(project.createdAt)}</div>
          </div>
          <div class="overview-item">
            <div class="overview-label">最后更新</div>
            <div class="overview-value" style="font-size: 14px;">${formatDateTime(project.updatedAt)}</div>
          </div>
        </div>
        ${project.description ? `
          <div style="margin-top: 15px; padding: 15px; background: #1a1a2e; border-radius: 6px; font-size: 14px; color: #ccc;">
            <strong>描述：</strong>${project.description}
          </div>
        ` : ''}
      `;
    }
    
    // 渲染工作流图
    function renderWorkflow(data) {
      const { pipeline, project } = data;
      const container = document.getElementById('workflowContainer');
      
      if (!pipeline || !pipeline.phases) {
        container.innerHTML = '<div class="empty-state">暂无工作流数据</div>';
        return;
      }
      
      // 加载工作流状态
      fetch(`${API_BASE}/project/${selectedProject}/workflow`)
        .then(res => res.json())
        .then(workflowState => {
          const svg = renderWorkflowSVG(workflowState, pipeline);
          const nextStep = renderNextStep(workflowState.nextStep);
          
          container.innerHTML = `
            ${svg}
            ${nextStep}
            <div class="legend">
              <div class="legend-item">
                <div class="legend-dot legend-pending"></div>
                <span>待处理</span>
              </div>
              <div class="legend-item">
                <div class="legend-dot legend-active"></div>
                <span>进行中</span>
              </div>
              <div class="legend-item">
                <div class="legend-dot legend-completed"></div>
                <span>已完成</span>
              </div>
            </div>
          `;
        })
        .catch(e => {
          container.innerHTML = `<div class="error-msg">加载工作流失败：${e.message}</div>`;
        });
    }
    
    // 渲染 SVG 工作流
    function renderWorkflowSVG(workflowState, pipeline) {
      const phases = workflowState?.phases || pipeline.phases;
      const phaseHeight = 140;
      const phaseGap = 30;
      const leftMargin = 280;
      const topMargin = 20;
      const phaseWidth = 240;
      const taskWidth = 200;
      
      const totalHeight = phases.length * (phaseHeight + phaseGap) + topMargin * 2;
      
      let svg = `<svg class="workflow-svg" viewBox="0 0 ${leftMargin + phaseWidth + taskWidth + 100} ${totalHeight}" preserveAspectRatio="xMinYMin meet">
        <defs>
          <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#4b5563" />
          </marker>
          <marker id="arrowhead-active" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6" />
          </marker>
        </defs>`;
      
      phases.forEach((phase, phaseIndex) => {
        const y = topMargin + phaseIndex * (phaseHeight + phaseGap);
        const isActive = phase.status === 'active';
        const isCompleted = phase.status === 'completed';
        const statusClass = phase.status;
        
        // Phase 矩形
        svg += `
          <g class="phase-node phase-${statusClass}" transform="translate(0, ${y})">
            <rect class="phase-rect" x="10" y="0" width="${phaseWidth}" height="${phaseHeight}" />
            <text class="phase-title" x="${phaseWidth / 2}" y="30" text-anchor="middle">
              ${phaseIndex + 1}. ${phase.name}
            </text>
            <text class="phase-desc" x="${phaseWidth / 2}" y="55" text-anchor="middle">
              ${phase.description || ''}
            </text>
            <text class="phase-desc" x="${phaseWidth / 2}" y="75" text-anchor="middle" fill="#60a5fa">
              ${phase.tasks.length} 个任务
            </text>
          </g>
        `;
        
        // 任务节点
        phase.tasks.forEach((task, taskIndex) => {
          const taskY = y + 95 + taskIndex * 35;
          const taskStatusClass = task.status;
          
          // 任务连线
          const arrowClass = isActive && task.status === 'pending' ? 'flow-arrow-active' : 'flow-arrow';
          const markerEnd = isActive && task.status === 'pending' ? 'url(#arrowhead-active)' : 'url(#arrowhead)';
          
          svg += `
            <line class="${arrowClass}" 
                  x1="${phaseWidth + 20}" y1="${taskY + 10}" 
                  x2="${leftMargin - 10}" y2="${taskY + 10}" 
                  marker-end="${markerEnd}" />
            
            <g class="task-node task-${taskStatusClass}" transform="translate(${leftMargin}, ${taskY})">
              <circle class="task-circle" cx="15" cy="10" r="12" />
              <text class="task-label" x="35" y="8" dominant-baseline="middle">
                ${task.name}
              </text>
              <text class="task-agent" x="35" y="22" dominant-baseline="middle">
                🤖 ${task.expertId || '未分配'}
              </text>
            </g>
          `;
        });
        
        // Phase 之间的箭头
        if (phaseIndex < phases.length - 1) {
          const arrowY = y + phaseHeight;
          svg += `
            <line class="flow-arrow" 
                  x1="${phaseWidth / 2 + 10}" y1="${arrowY}" 
                  x2="${phaseWidth / 2 + 10}" y2="${arrowY + phaseGap - 10}" 
                  marker-end="url(#arrowhead)" />
          `;
        }
      });
      
      svg += '</svg>';
      return svg;
    }
    
    // 渲染下一步预测
    function renderNextStep(nextStep) {
      if (!nextStep) {
        return '<div class="next-step-box" style="background: linear-gradient(135deg, #14532d 0%, #064e3b 100%); border-color: #4ade80;"><div class="next-step-title">✅ 所有任务已完成</div></div>';
      }
      
      return `
        <div class="next-step-box">
          <div class="next-step-title">
            🎯 预计下一步
          </div>
          <div class="next-step-content">
            <div class="next-step-item">
              <div class="next-step-label">阶段</div>
              <div class="next-step-value">${nextStep.phaseName}</div>
            </div>
            <div class="next-step-item">
              <div class="next-step-label">任务</div>
              <div class="next-step-value">${nextStep.taskName}</div>
            </div>
            <div class="next-step-item">
              <div class="next-step-label">负责 Agent</div>
              <div class="next-step-value" style="font-family: monospace;">${nextStep.expertId}</div>
            </div>
          </div>
        </div>
      `;
    }
    
    // 渲染 Agent 状态网格
    function renderAgentGrid(data) {
      const { agentStatuses } = data;
      const grid = document.getElementById('agentGrid');
      
      const agents = Object.entries(agentStatuses);
      if (agents.length === 0) {
        grid.innerHTML = '<div class="empty-state">暂无 Agent 数据</div>';
        return;
      }
      
      grid.innerHTML = agents.map(([agentId, status]) => `
        <div class="agent-card">
          <div class="agent-header">
            <span class="agent-name">${agentId}</span>
            <span class="agent-status status-${status.status || 'unknown'}">${getStatusText(status.status || 'unknown')}</span>
          </div>
          <div class="agent-info">
            ${status.currentTask ? `<p><strong>当前任务:</strong> ${status.currentTask}</p>` : '<p><strong>当前任务:</strong> 无</p>'}
            ${status.agentId && status.agentId !== 'pending' ? `<p><strong>Session:</strong> <span style="font-family: monospace; font-size: 12px;">${status.agentId}</span></p>` : ''}
            <p><strong>最后心跳:</strong> ${formatTime(status.lastHeartbeat)}</p>
            <p><strong>能力:</strong> ${status.capabilities?.join(', ') || '-'}</p>
          </div>
        </div>
      `).join('');
    }
    
    // 渲染 Agent 产出 Tab
    function renderAgentDeliverablesTabs(data) {
      const { agentStatuses } = data;
      const tabsHeader = document.getElementById('tabsHeader');
      const deliverablesTabs = document.getElementById('agentDeliverablesTabs');
      
      // 生成 Tab 按钮
      const agentIds = Object.keys(agentStatuses);
      tabsHeader.innerHTML = `
        <button class="tab-button active" onclick="switchTab('workflow')" id="btn-workflow">
          📊 工作流
        </button>
        <button class="tab-button" onclick="switchTab('agents')" id="btn-agents">
          🤖 Agent 状态
        </button>
        ${agentIds.map(agentId => `
          <button class="tab-button" onclick="switchTab('deliverables-${agentId}')" id="btn-deliverables-${agentId}">
            📦 ${agentId}
            <span class="tab-badge" id="badge-${agentId}">0</span>
          </button>
        `).join('')}
      `;
      
      // 生成 Tab 内容
      deliverablesTabs.innerHTML = agentIds.map(agentId => `
        <div class="tab-content" id="tab-deliverables-${agentId}">
          <div class="section-title">📦 ${agentId} - 工作产出</div>
          <div id="deliverables-list-${agentId}">
            <div class="loading">加载产出文件中...</div>
          </div>
        </div>
      `).join('');
      
      // 加载每个 Agent 的产出文件
      agentIds.forEach(agentId => {
        loadAgentDeliverables(agentId);
      });
    }
    
    // 加载 Agent 产出文件
    async function loadAgentDeliverables(agentId) {
      try {
        const res = await fetch(`${API_BASE}/project/${selectedProject}/deliverables/${agentId}`);
        const deliverables = await res.json();
        
        const container = document.getElementById(`deliverables-list-${agentId}`);
        const badge = document.getElementById(`badge-${agentId}`);
        
        if (badge) badge.textContent = deliverables.length;
        
        if (deliverables.length === 0) {
          container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div><div>暂无产出文件</div></div>';
          return;
        }
        
        container.innerHTML = `
          <ul class="deliverables-list">
            ${deliverables.map(d => `
              <li class="deliverable-item">
                <div class="deliverable-info">
                  <div class="deliverable-name">${getFileIcon(d.name)} ${d.name}</div>
                  ${d.relativePath ? `<div class="deliverable-path">${d.relativePath}</div>` : ''}
                </div>
                <div class="deliverable-meta">
                  <div>${formatSize(d.size)}</div>
                  <div>${formatTime(d.modified)}</div>
                </div>
              </li>
            `).join('')}
          </ul>
        `;
      } catch (e) {
        const container = document.getElementById(`deliverables-list-${agentId}`);
        container.innerHTML = `<div class="error-msg">加载失败：${e.message}</div>`;
      }
    }
    
    // 切换 Tab
    function switchTab(tabId) {
      activeTab = tabId;
      
      // 更新按钮状态
      document.querySelectorAll('.tab-button').forEach(btn => {
        btn.classList.remove('active');
      });
      const activeBtn = document.getElementById(`btn-${tabId}`);
      if (activeBtn) activeBtn.classList.add('active');
      
      // 更新内容显示
      document.querySelectorAll('.tab-content').forEach(content => {
        content.classList.remove('active');
      });
      
      const activeContent = document.getElementById(`tab-${tabId}`);
      if (activeContent) activeContent.classList.add('active');
    }
    
    // 更新时间
    function updateLastUpdate() {
      document.getElementById('lastUpdate').textContent = formatTime(new Date());
    }
    
    // 初始化
    loadProjects();
    
    // 每 5 秒刷新
    setInterval(() => {
      if (selectedProject) {
        loadProjectDetails(selectedProject);
      }
      loadProjects();
    }, 5000);
  </script>
</body>
</html>
